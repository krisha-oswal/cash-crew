<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cash Crew - AI Equity Research</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .header p {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            margin-bottom: 30px;
        }

        .input-section {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        input,
        select,
        button {
            padding: 15px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .loading {
            text-align: center;
            padding: 40px;
            display: none;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f4f6;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .results {
            display: none;
        }

        .results.active {
            display: block;
        }

        .recommendation {
            text-align: center;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
        }

        .recommendation.buy {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
        }

        .recommendation.hold {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            color: white;
        }

        .recommendation.sell {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: white;
        }

        .recommendation h2 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .recommendation .score {
            font-size: 3rem;
            font-weight: 800;
            margin: 10px 0;
        }

        .agent-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .agent-card {
            background: #f8fafc;
            padding: 20px;
            border-radius: 15px;
            border-left: 4px solid #667eea;
        }

        .agent-card h3 {
            color: #1e293b;
            margin-bottom: 10px;
            font-size: 1.1rem;
        }

        .agent-score {
            font-size: 2rem;
            font-weight: 700;
            color: #667eea;
            margin: 10px 0;
        }

        .agent-confidence {
            color: #64748b;
            font-size: 0.9rem;
        }

        .explanation {
            background: #f8fafc;
            padding: 25px;
            border-radius: 15px;
            line-height: 1.8;
            margin-bottom: 20px;
        }

        .explanation h3 {
            color: #1e293b;
            margin-bottom: 15px;
        }

        .download-btn {
            background: #1e293b;
            margin-top: 20px;
        }

        .error {
            background: #fee2e2;
            color: #991b1b;
            padding: 20px;
            border-radius: 10px;
            border-left: 4px solid #dc2626;
            display: none;
        }

        .error.active {
            display: block;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>💰 Cash Crew</h1>
            <p>Multi-Agent AI Equity Research System</p>
        </div>

        <div class="card">
            <div class="input-section">
                <input type="text" id="ticker" placeholder="Enter stock ticker (e.g., AAPL, TCS.NS)" value="AAPL">
                <select id="timeframe">
                    <option value="1y">1 Year</option>
                    <option value="6m">6 Months</option>
                    <option value="3m">3 Months</option>
                </select>
                <select id="risk">
                    <option value="balanced">Balanced</option>
                    <option value="conservative">Conservative</option>
                    <option value="aggressive">Aggressive</option>
                </select>
            </div>
            <button id="analyzeBtn" onclick="analyzeStock()">Analyze Stock</button>
        </div>

        <div class="error" id="error"></div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Analyzing stock with 6 AI agents...</p>
            <p style="color: #64748b; margin-top: 10px;">This may take 30-60 seconds</p>
        </div>

        <div class="results" id="results">
            <div class="card">
                <div class="recommendation" id="recommendation">
                    <h2 id="recText">BUY</h2>
                    <div class="score" id="score">75.5</div>
                    <p id="confidence">Confidence: 85%</p>
                    <p id="company">Apple Inc (AAPL)</p>
                </div>

                <div class="agent-grid" id="agentGrid"></div>

                <div class="explanation" id="explanation">
                    <h3>📊 Analysis Explanation</h3>
                    <div id="explanationText"></div>
                </div>

                <button class="download-btn" onclick="downloadReport()">Download Full Report</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8000';
        let currentTicker = '';

        async function analyzeStock() {
            const ticker = document.getElementById('ticker').value.trim().toUpperCase();
            const timeframe = document.getElementById('timeframe').value;
            const risk = document.getElementById('risk').value;

            if (!ticker) {
                showError('Please enter a stock ticker');
                return;
            }

            currentTicker = ticker;

            // Show loading, hide results and errors
            document.getElementById('loading').classList.add('active');
            document.getElementById('results').classList.remove('active');
            document.getElementById('error').classList.remove('active');
            document.getElementById('analyzeBtn').disabled = true;

            try {
                const response = await fetch(`${API_URL}/analyze`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        ticker: ticker,
                        timeframe: timeframe,
                        risk_preference: risk
                    })
                });

                if (!response.ok) {
                    throw new Error(`Analysis failed: ${response.statusText}`);
                }

                const data = await response.json();
                displayResults(data);

            } catch (error) {
                showError(error.message);
            } finally {
                document.getElementById('loading').classList.remove('active');
                document.getElementById('analyzeBtn').disabled = false;
            }
        }

        function displayResults(data) {
            // Update recommendation
            const recDiv = document.getElementById('recommendation');
            recDiv.className = 'recommendation ' + data.recommendation.toLowerCase();
            document.getElementById('recText').textContent = data.recommendation;
            document.getElementById('score').textContent = data.final_score.toFixed(1);
            document.getElementById('confidence').textContent = `Confidence: ${(data.confidence * 100).toFixed(0)}%`;
            document.getElementById('company').textContent = `${data.company_name} (${data.ticker})`;

            // Update agent cards - ALL 9 AGENTS
            const agentGrid = document.getElementById('agentGrid');
            agentGrid.innerHTML = '';

            const agents = [
                { name: 'Fundamental', data: data.fundamental_score },
                { name: 'Technical', data: data.technical_score },
                { name: 'Sentiment', data: data.sentiment_score },
                { name: 'Governance', data: data.governance_score },
                { name: 'PEAD', data: data.pead_score },
                { name: 'Financial Health', data: data.financial_health_score },
                { name: 'Risk', data: data.risk_score }
            ];

            agents.forEach(agent => {
                if (agent.data && agent.data.score !== null) {
                    const card = document.createElement('div');
                    card.className = 'agent-card';
                    card.innerHTML = `
                        <h3>${agent.name} Analyst</h3>
                        <div class="agent-score">${agent.data.score.toFixed(1)}</div>
                        <div class="agent-confidence">Confidence: ${(agent.data.confidence * 100).toFixed(0)}%</div>
                        <p style="margin-top: 10px; font-size: 0.9rem; color: #64748b;">${agent.data.explanation || ''}</p>
                    `;
                    agentGrid.appendChild(card);
                }
            });

            // Update explanation
            document.getElementById('explanationText').innerHTML = formatExplanation(data.xai_explanation);

            // Show results
            document.getElementById('results').classList.add('active');
        }

        function formatExplanation(text) {
            if (!text) return 'No explanation available';

            // Convert markdown-style formatting to HTML
            return text
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\n\n/g, '</p><p>')
                .replace(/\n/g, '<br>')
                .replace(/^/, '<p>')
                .replace(/$/, '</p>');
        }

        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.classList.add('active');
        }

        async function downloadReport() {
            const ticker = currentTicker;
            const timeframe = document.getElementById('timeframe').value;
            const risk = document.getElementById('risk').value;

            try {
                const response = await fetch(`${API_URL}/report/pdf`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        ticker: ticker,
                        timeframe: timeframe,
                        risk_preference: risk
                    })
                });

                if (!response.ok) {
                    throw new Error('Report generation failed');
                }

                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${ticker}_report.pdf`;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);

            } catch (error) {
                showError('Failed to download report: ' + error.message);
            }
        }

        // Allow Enter key to trigger analysis
        document.getElementById('ticker').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                analyzeStock();
            }
        });
    </script>
</body>

</html>
